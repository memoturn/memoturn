# Dev dependencies only — run apps locally with `pnpm dev`.
# Usage: docker compose -f infra/docker-compose.dev.yml up -d
name: memoturn-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: memoturn
      POSTGRES_PASSWORD: memoturn
      POSTGRES_DB: memoturn
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoturn -d memoturn"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: memoturn
      CLICKHOUSE_PASSWORD: memoturn
      CLICKHOUSE_DB: memoturn
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP
      - "9009:9000"   # native (host 9009 to avoid clashing with MinIO 9000)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user $$CLICKHOUSE_USER --password $$CLICKHOUSE_PASSWORD --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: memoturn
      MINIO_ROOT_PASSWORD: memoturn123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the memoturn bucket on startup, then exits.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 memoturn memoturn123 &&
      mc mb --ignore-existing local/memoturn &&
      echo 'memoturn bucket ready';
      "

volumes:
  pgdata:
  chdata:
  redisdata:
  miniodata:
