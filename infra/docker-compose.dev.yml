# Dev dependencies only — run apps locally with `pnpm dev`.
# Usage: docker compose -f infra/docker-compose.dev.yml up -d
name: memoturn-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: memoturn
      POSTGRES_PASSWORD: memoturn
      POSTGRES_DB: memoturn
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoturn -d memoturn"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Apache Doris (OLAP — traces/observations/scores). FE = query/metadata, BE = storage.
  # The init scripts self-register the BE with the FE, which needs stable IPs — hence the
  # dedicated subnet. Doris FE+BE want ~4 GB of Docker memory between them.
  doris-fe:
    image: apache/doris:fe-4.1.2
    restart: unless-stopped
    # Started only for the doris telemetry engine — `bun run infra:up` activates this
    # profile unless TELEMETRY_ENGINE=postgres (ADR-0002; see scripts/infra.ts).
    profiles: ["doris"]
    # Cap the FE heap for dev: the stock fe.conf asks for an 8 GB JVM, but the whole
    # dev VM is typically 6-8 GB shared with the BE + Postgres + MinIO. Without the cap,
    # sustained ingest starves the BE's memory watermark and queries fail (MEM_ALLOC_FAILED).
    entrypoint:
      [
        "bash",
        "-c",
        "sed -i 's/-Xmx8192m/-Xmx2048m/; s/-Xms8192m/-Xms1024m/' /opt/apache-doris/fe/conf/fe.conf; exec bash /usr/local/bin/init_fe.sh",
      ]
    environment:
      FE_SERVERS: fe1:172.28.80.2:9010
      FE_ID: 1
      # Works around a JDK 17.0.12 cgroup-v2 detection NPE (CgroupInfo.getMountPoint)
      # that crash-loops the FE on some hosts (e.g. GitHub Actions runners).
      JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"
    ports:
      # Loopback-only: dev Doris has no password, and with an empty root password
      # the FE HTTP API accepts any credentials.
      - "127.0.0.1:9030:9030"   # MySQL protocol (queries + DDL)
      - "127.0.0.1:8030:8030"   # HTTP (health, admin)
    volumes:
      - dorisfemeta:/opt/apache-doris/fe/doris-meta
    networks:
      # doris-network only (host access is via the published ports): with a second
      # network attached, the FE can bind its edit-log port to the wrong interface
      # after a container recreate (priority_networks is only written to fe.conf on
      # first bootstrap), deadlocking the BDB master election.
      doris:
        ipv4_address: 172.28.80.2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/bootstrap || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  doris-be:
    image: apache/doris:be-4.1.2
    restart: unless-stopped
    profiles: ["doris"]
    # Cap BE process memory for dev (default is ~90% of system memory, which assumes a
    # dedicated host). 6G is comfortable for the demo dataset while leaving room for the FE
    # and the other dev containers; a lower cap OOMs analytical queries with MEM_ALLOC_FAILED.
    # Override with DORIS_BE_MEM_LIMIT in .env (absolute like 4G, or a % of host memory).
    entrypoint:
      [
        "bash",
        "-c",
        "grep -q '^mem_limit' /opt/apache-doris/be/conf/be.conf || echo 'mem_limit = ${DORIS_BE_MEM_LIMIT:-6G}' >> /opt/apache-doris/be/conf/be.conf; exec bash /usr/local/bin/entry_point.sh",
      ]
    depends_on:
      doris-fe:
        condition: service_healthy
    environment:
      FE_SERVERS: fe1:172.28.80.2:9010
      BE_ADDR: 172.28.80.3:9050
      # Works around a JDK 17.0.12 cgroup-v2 detection NPE (CgroupInfo.getMountPoint)
      # that crash-loops the JVM sidecars on some hosts (e.g. GitHub Actions runners).
      JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"
    ulimits:
      nofile:
        soft: 655350
        hard: 655350
    ports:
      # BE HTTP (webserver) — exposed so a host-run worker can Stream Load directly to the
      # BE (the FE's 307 redirect points at the BE's in-network IP, unreachable from the
      # host). Set DORIS_STREAM_LOAD_PORT=8040 to use it. In-container deploys hit the FE.
      - "127.0.0.1:8040:8040"
    volumes:
      - dorisbedata:/opt/apache-doris/be/storage
    networks:
      doris:
        ipv4_address: 172.28.80.3
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8040/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: memoturn
      MINIO_ROOT_PASSWORD: memoturn123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local mail catcher — captures all outbound email (password reset, org invites,
  # verification) so the auth flows are testable offline with no real mail provider.
  # Point the app at it with SMTP_CONNECTION_URL=smtp://localhost:1025; read captured
  # mail in the web UI at http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # web UI
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the memoturn bucket on startup, then exits.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 memoturn memoturn123 &&
      mc mb --ignore-existing local/memoturn &&
      echo 'memoturn bucket ready';
      "

volumes:
  pgdata:
  dorisfemeta:
  dorisbedata:
  redisdata:
  miniodata:

networks:
  doris:
    ipam:
      config:
        - subnet: 172.28.80.0/24
