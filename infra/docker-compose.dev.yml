# Dev dependencies only — run apps locally with `pnpm dev`.
# Usage: docker compose -f infra/docker-compose.dev.yml up -d
name: memoturn-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: memoturn
      POSTGRES_PASSWORD: memoturn
      POSTGRES_DB: memoturn
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoturn -d memoturn"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Apache Doris (OLAP — traces/observations/scores). FE = query/metadata, BE = storage.
  # The init scripts self-register the BE with the FE, which needs stable IPs — hence the
  # dedicated subnet. Doris FE+BE want ~4 GB of Docker memory between them.
  doris-fe:
    image: apache/doris:fe-3.1.4
    restart: unless-stopped
    environment:
      FE_SERVERS: fe1:172.28.80.2:9010
      FE_ID: 1
    ports:
      - "9030:9030"   # MySQL protocol (queries + DDL)
      - "8030:8030"   # HTTP (health, admin)
    volumes:
      - dorisfemeta:/opt/apache-doris/fe/doris-meta
    networks:
      default: {}
      doris:
        ipv4_address: 172.28.80.2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/bootstrap || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  doris-be:
    image: apache/doris:be-3.1.4
    restart: unless-stopped
    depends_on:
      doris-fe:
        condition: service_healthy
    environment:
      FE_SERVERS: fe1:172.28.80.2:9010
      BE_ADDR: 172.28.80.3:9050
    ulimits:
      nofile:
        soft: 655350
        hard: 655350
    volumes:
      - dorisbedata:/opt/apache-doris/be/storage
    networks:
      default: {}
      doris:
        ipv4_address: 172.28.80.3
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8040/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: memoturn
      MINIO_ROOT_PASSWORD: memoturn123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the memoturn bucket on startup, then exits.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 memoturn memoturn123 &&
      mc mb --ignore-existing local/memoturn &&
      echo 'memoturn bucket ready';
      "

volumes:
  pgdata:
  dorisfemeta:
  dorisbedata:
  redisdata:
  miniodata:

networks:
  doris:
    ipam:
      config:
        - subnet: 172.28.80.0/24
