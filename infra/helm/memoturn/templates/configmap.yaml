apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "memoturn.fullname" . }}-config
  labels:
    {{- include "memoturn.labels" . | nindent 4 }}
data:
  NODE_ENV: production
  DORIS_PORT: {{ .Values.config.doris.port | quote }}
  DORIS_HTTP_PORT: {{ .Values.config.doris.httpPort | quote }}
  DORIS_USER: {{ .Values.config.doris.user | quote }}
  DORIS_DB: {{ .Values.config.doris.db | quote }}
  BLOB_REGION: {{ .Values.config.blobRegion | quote }}
  BLOB_BUCKET: {{ .Values.config.blobBucket | quote }}
  BLOB_FORCE_PATH_STYLE: {{ .Values.config.blobForcePathStyle | quote }}
  {{- with .Values.config.authBaseUrl }}
  AUTH_BASE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.authTrustedOrigins }}
  AUTH_TRUSTED_ORIGINS: {{ . | quote }}
  {{- end }}
