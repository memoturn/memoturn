{{- if not .Values.config.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memoturn.secretName" . }}
  labels:
    {{- include "memoturn.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "config.databaseUrl is required (or set config.existingSecret)" .Values.config.databaseUrl | quote }}
  REDIS_URL: {{ required "config.redisUrl is required (or set config.existingSecret)" .Values.config.redisUrl | quote }}
  BETTER_AUTH_SECRET: {{ required "config.betterAuthSecret is required (or set config.existingSecret)" .Values.config.betterAuthSecret | quote }}
  ENCRYPTION_KEY: {{ required "config.encryptionKey is required (or set config.existingSecret)" .Values.config.encryptionKey | quote }}
  DORIS_HOST: {{ required "config.doris.host is required (or set config.existingSecret)" .Values.config.doris.host | quote }}
  DORIS_PASSWORD: {{ .Values.config.doris.password | quote }}
  BLOB_ENDPOINT: {{ required "config.blob.endpoint is required (or set config.existingSecret)" .Values.config.blob.endpoint | quote }}
  BLOB_ACCESS_KEY_ID: {{ .Values.config.blob.accessKeyId | quote }}
  BLOB_SECRET_ACCESS_KEY: {{ .Values.config.blob.secretAccessKey | quote }}
{{- end }}
