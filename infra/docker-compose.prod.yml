# Single-VM production stack — Caddy (TLS) + console + API + worker + all dependencies.
#
# Usage:
#   cp .env.production.example .env   # then fill in MEMOTURN_DOMAIN, ACME_EMAIL, and secrets
#   docker compose -f infra/docker-compose.prod.yml --env-file .env up -d --build
#
# Caddy is the ONLY publicly exposed service (80/443). It terminates TLS (auto Let's Encrypt
# for MEMOTURN_DOMAIN) and routes `/api/*` -> the API (prefix stripped) and everything else ->
# the console. The datastores and app services are reachable only on the internal compose
# network. Required secrets use `${VAR:?message}` so a missing value fails the command loudly
# instead of silently falling back to a dev default (which the API/worker would reject anyway —
# see packages/server/src/env.ts).
name: memoturn

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - console
    environment:
      MEMOTURN_DOMAIN: ${MEMOTURN_DOMAIN:?set MEMOTURN_DOMAIN in .env (the public hostname, e.g. memoturn.example.com)}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env (for Let's Encrypt cert notices)}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: memoturn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: memoturn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoturn -d memoturn"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Apache Doris (OLAP). FE = query/metadata, BE = storage; the BE self-registers with
  # the FE via stable IPs on the dedicated subnet. Not exposed on the host network.
  doris-fe:
    image: apache/doris:fe-4.1.2
    restart: unless-stopped
    environment:
      FE_SERVERS: fe1:172.28.82.2:9010
      FE_ID: 1
    volumes:
      - dorisfemeta:/opt/apache-doris/fe/doris-meta
    networks:
      default: {}
      doris:
        ipv4_address: 172.28.82.2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/bootstrap || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  doris-be:
    image: apache/doris:be-4.1.2
    restart: unless-stopped
    depends_on:
      doris-fe:
        condition: service_healthy
    environment:
      FE_SERVERS: fe1:172.28.82.2:9010
      BE_ADDR: 172.28.82.3:9050
    ulimits:
      nofile: { soft: 655350, hard: 655350 }
    volumes:
      - dorisbedata:/opt/apache-doris/be/storage
    networks:
      default: {}
      doris:
        ipv4_address: 172.28.82.3
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8040/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  # One-shot: sets the Doris root password (the image boots with root/empty). Idempotent —
  # if the password is already set, the first probe succeeds and it exits.
  doris-setup:
    image: curlimages/curl:latest
    depends_on:
      doris-fe:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      if curl -sf -u root:${DORIS_PASSWORD:?set DORIS_PASSWORD in .env} -H 'Content-Type: application/json'
        -d '{\"stmt\":\"SELECT 1\"}' http://doris-fe:8030/api/query/default_cluster/information_schema >/dev/null; then
        echo 'doris root password already set'; exit 0;
      fi;
      curl -sf -u root: -H 'Content-Type: application/json'
        -d \"{\\\"stmt\\\":\\\"SET PASSWORD FOR 'root' = PASSWORD('${DORIS_PASSWORD}')\\\"}\"
        http://doris-fe:8030/api/query/default_cluster/information_schema &&
      echo 'doris root password set';
      "

  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${BLOB_ACCESS_KEY_ID:-memoturn}
      MINIO_ROOT_PASSWORD: ${BLOB_SECRET_ACCESS_KEY:?set BLOB_SECRET_ACCESS_KEY in .env}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${BLOB_ACCESS_KEY_ID:-memoturn} ${BLOB_SECRET_ACCESS_KEY:?set BLOB_SECRET_ACCESS_KEY in .env} &&
      mc mb --ignore-existing local/${BLOB_BUCKET:-memoturn};
      "

  # One-shot schema migration. Runs Prisma (Postgres) then the Doris DDL, reading
  # connection config from the injected env. Calls the telemetry script directly rather than
  # `bun run db:telemetry` to bypass that script's hardcoded `--env-file=../../.env` (no such
  # file in the image). api/worker wait for this to complete successfully before starting.
  migrate:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
      doris-fe: { condition: service_healthy }
      doris-be: { condition: service_healthy }
      doris-setup: { condition: service_completed_successfully }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://memoturn:${POSTGRES_PASSWORD:?}@postgres:5432/memoturn?schema=public
      DORIS_HOST: doris-fe
      DORIS_PORT: "9030"
      DORIS_HTTP_PORT: "8030"
      DORIS_USER: root
      DORIS_PASSWORD: ${DORIS_PASSWORD:?}
      DORIS_DB: memoturn
    command: ["sh", "-c", "bun --filter @memoturn/db migrate && bun packages/telemetry/src/migrate.ts"]

  # Public API (Hono on Bun): /v1 ingest + OTel receiver + read API + /auth + OpenAPI.
  # No host port — reached only through Caddy at https://DOMAIN/api.
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      doris-fe: { condition: service_healthy }
      doris-be: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      DATABASE_URL: postgresql://memoturn:${POSTGRES_PASSWORD:?}@postgres:5432/memoturn?schema=public
      DORIS_HOST: doris-fe
      DORIS_PORT: "9030"
      DORIS_HTTP_PORT: "8030"
      DORIS_USER: root
      DORIS_PASSWORD: ${DORIS_PASSWORD:?}
      DORIS_DB: memoturn
      REDIS_URL: redis://redis:6379
      BLOB_ENDPOINT: http://minio:9000
      BLOB_REGION: us-east-1
      BLOB_BUCKET: ${BLOB_BUCKET:-memoturn}
      BLOB_ACCESS_KEY_ID: ${BLOB_ACCESS_KEY_ID:-memoturn}
      BLOB_SECRET_ACCESS_KEY: ${BLOB_SECRET_ACCESS_KEY:?}
      BLOB_FORCE_PATH_STYLE: "true"
      # Auth / encryption — mandatory in production (env.ts refuses to boot without them).
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env (openssl rand -base64 48)}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env (openssl rand -base64 48)}
      AUTH_BASE_URL: https://${MEMOTURN_DOMAIN:?}/api
      AUTH_TRUSTED_ORIGINS: https://${MEMOTURN_DOMAIN:?}
      ALLOW_PRIVATE_WEBHOOK_TARGETS: ${ALLOW_PRIVATE_WEBHOOK_TARGETS:-0}
      # Per-project request rate limit, ON by default in production (generous — raise/lower
      # to taste, or set 0 to disable). INGEST_EVENTS_PER_MINUTE additionally caps event
      # volume (0 = off) for deployments that need to bound a single project's ingest.
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-600}
      INGEST_EVENTS_PER_MINUTE: ${INGEST_EVENTS_PER_MINUTE:-0}

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      doris-fe: { condition: service_healthy }
      doris-be: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://memoturn:${POSTGRES_PASSWORD:?}@postgres:5432/memoturn?schema=public
      DORIS_HOST: doris-fe
      DORIS_PORT: "9030"
      DORIS_HTTP_PORT: "8030"
      DORIS_USER: root
      DORIS_PASSWORD: ${DORIS_PASSWORD:?}
      DORIS_DB: memoturn
      REDIS_URL: redis://redis:6379
      BLOB_ENDPOINT: http://minio:9000
      BLOB_REGION: us-east-1
      BLOB_BUCKET: ${BLOB_BUCKET:-memoturn}
      BLOB_ACCESS_KEY_ID: ${BLOB_ACCESS_KEY_ID:-memoturn}
      BLOB_SECRET_ACCESS_KEY: ${BLOB_SECRET_ACCESS_KEY:?}
      BLOB_FORCE_PATH_STYLE: "true"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?}
      AUTH_TRUSTED_ORIGINS: https://${MEMOTURN_DOMAIN:?}
      ALLOW_PRIVATE_WEBHOOK_TARGETS: ${ALLOW_PRIVATE_WEBHOOK_TARGETS:-0}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}

  # Console SPA (Vite preview). `--host 0.0.0.0` so Caddy can reach it across the container
  # network (preview binds to localhost by default). Built with VITE_API_BASE=/api (image
  # default), so the SPA calls same-origin /api/* which Caddy forwards to the API.
  console:
    build:
      context: ..
      dockerfile: docker/console.Dockerfile
    restart: unless-stopped
    command: ["bun", "--filter", "@memoturn/console", "preview", "--host", "0.0.0.0"]

volumes:
  pgdata:
  dorisfemeta:
  dorisbedata:
  redisdata:
  miniodata:
  caddy_data:
  caddy_config:

networks:
  doris:
    ipam:
      config:
        - subnet: 172.28.82.0/24
