# Full self-host stack — web + worker + all dependencies.
# Usage: docker compose -f infra/docker-compose.yml --env-file .env up -d --build
# Datastore credentials are required (no weak defaults): set POSTGRES_PASSWORD,
# DORIS_PASSWORD, BLOB_ACCESS_KEY_ID, BLOB_SECRET_ACCESS_KEY (plus the api/worker
# secrets BETTER_AUTH_SECRET, ENCRYPTION_KEY, AUTH_TRUSTED_ORIGINS) in .env before `up`.
name: memoturn

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: memoturn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: memoturn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoturn -d memoturn"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Apache Doris (OLAP). FE = query/metadata, BE = storage; the BE self-registers with
  # the FE via stable IPs on the dedicated subnet. Not exposed on the host network.
  doris-fe:
    image: apache/doris:fe-4.1.2
    restart: unless-stopped
    environment:
      FE_SERVERS: fe1:172.28.81.2:9010
      FE_ID: 1
      # Works around a JDK 17.0.12 cgroup-v2 detection NPE (CgroupInfo.getMountPoint)
      # that crash-loops the FE on some hosts (e.g. GitHub Actions runners).
      JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"
    volumes:
      - dorisfemeta:/opt/apache-doris/fe/doris-meta
    networks:
      default: {}
      doris:
        ipv4_address: 172.28.81.2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/bootstrap || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  doris-be:
    image: apache/doris:be-4.1.2
    restart: unless-stopped
    depends_on:
      doris-fe:
        condition: service_healthy
    environment:
      FE_SERVERS: fe1:172.28.81.2:9010
      BE_ADDR: 172.28.81.3:9050
      # Works around a JDK 17.0.12 cgroup-v2 detection NPE (CgroupInfo.getMountPoint)
      # that crash-loops the JVM sidecars on some hosts (e.g. GitHub Actions runners).
      JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"
    ulimits:
      nofile: { soft: 655350, hard: 655350 }
    volumes:
      - dorisbedata:/opt/apache-doris/be/storage
    networks:
      default: {}
      doris:
        ipv4_address: 172.28.81.3
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8040/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  # One-shot: sets the Doris root password (the image boots with root/empty). Idempotent —
  # if the password is already set, the first probe succeeds and it exits.
  doris-setup:
    image: curlimages/curl:latest
    depends_on:
      doris-fe:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      if curl -sf -u root:${DORIS_PASSWORD:?set DORIS_PASSWORD in .env} -H 'Content-Type: application/json'
        -d '{\"stmt\":\"SELECT 1\"}' http://doris-fe:8030/api/query/default_cluster/information_schema >/dev/null; then
        echo 'doris root password already set'; exit 0;
      fi;
      curl -sf -u root: -H 'Content-Type: application/json'
        -d \"{\\\"stmt\\\":\\\"SET PASSWORD FOR 'root' = PASSWORD('${DORIS_PASSWORD}')\\\"}\"
        http://doris-fe:8030/api/query/default_cluster/information_schema &&
      echo 'doris root password set';
      "

  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${BLOB_ACCESS_KEY_ID:?set BLOB_ACCESS_KEY_ID in .env}
      MINIO_ROOT_PASSWORD: ${BLOB_SECRET_ACCESS_KEY:?set BLOB_SECRET_ACCESS_KEY in .env}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${BLOB_ACCESS_KEY_ID:?set BLOB_ACCESS_KEY_ID in .env} ${BLOB_SECRET_ACCESS_KEY:?set BLOB_SECRET_ACCESS_KEY in .env} &&
      mc mb --ignore-existing local/${BLOB_BUCKET:-memoturn};
      "

  # Public API (Hono on Bun): /v1 ingest + OTel receiver + read API + OpenAPI.
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      doris-fe: { condition: service_healthy }
      doris-be: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      DATABASE_URL: postgresql://memoturn:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/memoturn?schema=public
      DORIS_HOST: doris-fe
      DORIS_PORT: "9030"
      DORIS_HTTP_PORT: "8030"
      DORIS_USER: root
      DORIS_PASSWORD: ${DORIS_PASSWORD:?set DORIS_PASSWORD in .env}
      DORIS_DB: memoturn
      REDIS_URL: redis://redis:6379
      BLOB_ENDPOINT: http://minio:9000
      BLOB_REGION: us-east-1
      BLOB_BUCKET: ${BLOB_BUCKET:-memoturn}
      BLOB_ACCESS_KEY_ID: ${BLOB_ACCESS_KEY_ID:?set BLOB_ACCESS_KEY_ID in .env}
      BLOB_SECRET_ACCESS_KEY: ${BLOB_SECRET_ACCESS_KEY:?set BLOB_SECRET_ACCESS_KEY in .env}
      BLOB_FORCE_PATH_STYLE: "true"
    ports:
      - "${API_PORT:-3001}:3001"

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    depends_on:
      doris-fe: { condition: service_healthy }
      doris-be: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://memoturn:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/memoturn?schema=public
      DORIS_HOST: doris-fe
      DORIS_PORT: "9030"
      DORIS_HTTP_PORT: "8030"
      DORIS_USER: root
      DORIS_PASSWORD: ${DORIS_PASSWORD:?set DORIS_PASSWORD in .env}
      DORIS_DB: memoturn
      REDIS_URL: redis://redis:6379
      BLOB_ENDPOINT: http://minio:9000
      BLOB_REGION: us-east-1
      BLOB_BUCKET: ${BLOB_BUCKET:-memoturn}
      BLOB_ACCESS_KEY_ID: ${BLOB_ACCESS_KEY_ID:?set BLOB_ACCESS_KEY_ID in .env}
      BLOB_SECRET_ACCESS_KEY: ${BLOB_SECRET_ACCESS_KEY:?set BLOB_SECRET_ACCESS_KEY in .env}
      BLOB_FORCE_PATH_STYLE: "true"

volumes:
  pgdata:
  dorisfemeta:
  dorisbedata:
  redisdata:
  miniodata:

networks:
  doris:
    ipam:
      config:
        - subnet: 172.28.81.0/24
