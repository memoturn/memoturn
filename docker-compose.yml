# Local multi-node dev cluster: etcd (writer leases) + MinIO (object storage
# as source of truth) + two memoturnd nodes. `make up` / `make down`.
# Auth stays off — this is a dev posture; see .env.example for the fail-closed
# production knobs.

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    command:
      - etcd
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z # matches deploy/helm values
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: memoturn
      MINIO_ROOT_PASSWORD: memoturn-dev
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      retries: 30

  minio-init: # one-shot: create the bucket
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - mc alias set m http://minio:9000 memoturn memoturn-dev && mc mb -p m/memoturn

  memoturnd-1:
    build: .
    image: memoturn/memoturnd:dev
    depends_on:
      etcd:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment: &node-env
      MEMOTURN_OBJECT_STORE: s3://memoturn
      AWS_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: memoturn
      AWS_SECRET_ACCESS_KEY: memoturn-dev
      AWS_ALLOW_HTTP: "true"
      MEMOTURN_ETCD: http://etcd:2379
      MEMOTURN_ADVERTISE: http://memoturnd-1:8080
    ports: # host ports overridable when 8080/8081 are taken
      - "${MEMOTURN_PORT_1:-8080}:8080"

  memoturnd-2:
    image: memoturn/memoturnd:dev
    depends_on:
      memoturnd-1:
        condition: service_started
    environment:
      <<: *node-env
      MEMOTURN_ADVERTISE: http://memoturnd-2:8080
    ports:
      - "${MEMOTURN_PORT_2:-8081}:8080"
