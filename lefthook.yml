# Git hooks (installed via `bun run prepare` / postinstall).
pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: bunx @biomejs/biome check --no-errors-on-unmatched --staged

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    rbac:
      run: bun run rbac:check
    docs:
      run: bun run docs:check
