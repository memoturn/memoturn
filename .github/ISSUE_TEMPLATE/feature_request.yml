name: Feature request
description: Suggest an idea or enhancement for memoturn
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion! Please check the [roadmap](../blob/main/docs/roadmap.md) and existing issues first.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way today?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like memoturn to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Area
      options:
        - Observability / tracing
        - Prompts / playground
        - Evals / datasets
        - Metrics / dashboards
        - Platform / admin (auth, RBAC, retention)
        - SDKs / integrations
        - Deployment
        - Other
    validations:
      required: true
