name: Release

# Publishes the SDKs (npm + PyPI) and container images (GHCR) on a version tag.
# Requires repo secrets: NPM_TOKEN (npm automation token), PYPI_TOKEN (PyPI API token).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  npm:
    name: Publish @memoturn/sdk to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - run: bun --filter @memoturn/sdk build
      # Point the published manifest at dist. The repo keeps main/types on src for
      # zero-build local dev; publishConfig holds the dist mapping, flattened here so
      # publish is deterministic regardless of npm's publishConfig handling.
      - name: Apply dist entrypoints
        working-directory: sdks/js
        run: |
          node --input-type=module -e '
            import { readFileSync, writeFileSync } from "node:fs";
            const p = JSON.parse(readFileSync("package.json", "utf8"));
            Object.assign(p, p.publishConfig); delete p.publishConfig;
            writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '
      - name: Publish
        working-directory: sdks/js
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: Publish memoturn to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel + sdist
        working-directory: sdks/python
        run: uv build
      - name: Publish
        working-directory: sdks/python
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  images:
    name: Build + push ${{ matrix.service }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, worker, console]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
