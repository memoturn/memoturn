name: Release

# Publishes the SDKs (npm + PyPI) and container images (GHCR) on a version tag.
# Auth: npm uses the NPM_TOKEN repo secret (+ OIDC provenance); PyPI uses Trusted
# Publishing (OIDC, no secret) — register a pending publisher on PyPI for this repo
# + workflow first. GHCR uses the built-in GITHUB_TOKEN.
#
# Run via the Actions tab with "Dry run" checked to validate the whole pipeline
# without publishing anything (npm whoami + pack, uv build, images built but not pushed).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate without publishing (no npm/PyPI upload, images not pushed)"
        type: boolean
        default: false

jobs:
  npm:
    name: Publish @memoturn/sdk to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - run: bun --filter @memoturn/sdk build
      # Point the published manifest at dist. The repo keeps main/types on src for
      # zero-build local dev; publishConfig holds the dist mapping, flattened here so
      # publish is deterministic regardless of npm's publishConfig handling.
      - name: Apply dist entrypoints
        working-directory: sdks/js
        run: |
          node --input-type=module -e '
            import { readFileSync, writeFileSync } from "node:fs";
            const p = JSON.parse(readFileSync("package.json", "utf8"));
            Object.assign(p, p.publishConfig); delete p.publishConfig;
            writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '
      - name: Publish
        working-directory: sdks/js
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run — validating token + tarball, not publishing."
            npm whoami
            npm publish --dry-run
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: Publish memoturn to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC) — no token needed
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Build wheel + sdist
        working-directory: sdks/python
        run: uv build
      - name: Publish
        if: ${{ !inputs.dry_run }}
        working-directory: sdks/python
        run: uv publish --trusted-publishing always

  images:
    name: Build + push ${{ matrix.service }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, worker, console]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build${{ inputs.dry_run && ' (no push)' || ' + push' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
