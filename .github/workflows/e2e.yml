name: E2E

on:
  push:
    branches: [main]
  pull_request:

# A newer push supersedes an in-flight run on the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: e2e only reads the repo + runs tests (artifact upload needs no extra scope).
permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    # A healthy run is ~3–4 min; cap well above that so a hung step (e.g. a stalled
    # Playwright browser download) fails fast instead of riding GitHub's 6-hour default.
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memoturn
          POSTGRES_PASSWORD: memoturn
          POSTGRES_DB: memoturn
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U memoturn" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: valkey/valkey:8-alpine
        ports: ["6379:6379"]
      minio:
        # bitnami/minio was removed from Docker Hub; pinned via the bitnamilegacy archive.
        image: bitnamilegacy/minio:2025.7.23-debian-12-r5
        env:
          MINIO_ROOT_USER: memoturn
          MINIO_ROOT_PASSWORD: memoturn123
          MINIO_DEFAULT_BUCKETS: memoturn
        ports: ["9000:9000"]

    env:
      DATABASE_URL: postgresql://memoturn:memoturn@localhost:5432/memoturn?schema=public
      DORIS_HOST: localhost
      DORIS_PORT: "9030"
      DORIS_HTTP_PORT: "8030"
      DORIS_USER: root
      DORIS_PASSWORD: ""
      DORIS_DB: memoturn
      REDIS_URL: redis://localhost:6379
      BLOB_ENDPOINT: http://localhost:9000
      BLOB_REGION: us-east-1
      BLOB_BUCKET: memoturn
      BLOB_ACCESS_KEY_ID: memoturn
      BLOB_SECRET_ACCESS_KEY: memoturn123
      BLOB_FORCE_PATH_STYLE: "true"
      BETTER_AUTH_SECRET: e2e-better-auth-secret-please-change
      ENCRYPTION_KEY: e2e-encryption-key-32-bytes-long!!

    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - run: bun install --frozen-lockfile
      # Doris FE+BE need static IPs to register with each other, which GitHub service
      # containers can't provide — reuse the repo's dev compose definitions instead.
      # Explicit polling instead of `up --wait`: compose's waiter treats a dependency
      # still in `health: starting` as failed within seconds (observed locally + here).
      # The BE registers with the FE after start; the db:telemetry step retries until
      # a BE is alive, so FE readiness is the only hard gate.
      - name: Start Doris (FE + BE)
        run: |
          docker compose -f infra/docker-compose.dev.yml up -d --no-deps doris-fe
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8030/api/bootstrap >/dev/null; then echo "FE ready"; break; fi
            if [ "$i" = 60 ]; then echo "FE not ready after 5m" >&2; exit 1; fi
            sleep 5
          done
          docker compose -f infra/docker-compose.dev.yml up -d --no-deps doris-be
      - name: Doris logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.dev.yml logs doris-fe doris-be | tail -150
      - run: bun --filter @memoturn/db generate
      - run: bun --filter @memoturn/db migrate
      - run: bun run db:telemetry
      # The worker's Doris-backed integration tests (blob → worker → telemetry store)
      # gate on DORIS_HOST and need the real engine — this is the only job that has it.
      # The plain `build` job deliberately unsets DORIS_* so these skip there.
      - name: Worker integration tests (real Doris)
        run: bun --filter @memoturn/worker test
      # Cache the Playwright browser + OS deps so a transient download stall doesn't hang
      # the run (the version key busts the cache on a Playwright bump).
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(bunx playwright --version | grep -oE '[0-9.]+')" >> "$GITHUB_OUTPUT"
        working-directory: apps/console
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright browser (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium
        working-directory: apps/console
        timeout-minutes: 5
      - name: Install Playwright OS deps (cache hit — browser already cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium
        working-directory: apps/console
        timeout-minutes: 5
      # Playwright boots the API (start) + console (dev) via webServer and seeds in globalSetup.
      - name: Run E2E tests
        run: bun --filter @memoturn/console test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/console/playwright-report
          retention-days: 7
