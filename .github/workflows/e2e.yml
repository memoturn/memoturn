name: E2E

on:
  push:
    branches: [main]
  pull_request:

# A newer push supersedes an in-flight run on the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memoturn
          POSTGRES_PASSWORD: memoturn
          POSTGRES_DB: memoturn
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U memoturn" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: valkey/valkey:8-alpine
        ports: ["6379:6379"]
      minio:
        # bitnami/minio was removed from Docker Hub; pinned via the bitnamilegacy archive.
        image: bitnamilegacy/minio:2025.7.23-debian-12-r5
        env:
          MINIO_ROOT_USER: memoturn
          MINIO_ROOT_PASSWORD: memoturn123
          MINIO_DEFAULT_BUCKETS: memoturn
        ports: ["9000:9000"]

    env:
      DATABASE_URL: postgresql://memoturn:memoturn@localhost:5432/memoturn?schema=public
      DORIS_HOST: localhost
      DORIS_PORT: "9030"
      DORIS_HTTP_PORT: "8030"
      DORIS_USER: root
      DORIS_PASSWORD: ""
      DORIS_DB: memoturn
      REDIS_URL: redis://localhost:6379
      BLOB_ENDPOINT: http://localhost:9000
      BLOB_REGION: us-east-1
      BLOB_BUCKET: memoturn
      BLOB_ACCESS_KEY_ID: memoturn
      BLOB_SECRET_ACCESS_KEY: memoturn123
      BLOB_FORCE_PATH_STYLE: "true"
      BETTER_AUTH_SECRET: e2e-better-auth-secret-please-change
      ENCRYPTION_KEY: e2e-encryption-key-32-bytes-long!!

    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - run: bun install --frozen-lockfile
      # Doris FE+BE need static IPs to register with each other, which GitHub service
      # containers can't provide — reuse the repo's dev compose definitions instead.
      - name: Start Doris (FE + BE)
        run: docker compose -f infra/docker-compose.dev.yml up -d --wait doris-fe doris-be
      - run: bun --filter @memoturn/db generate
      - run: bun --filter @memoturn/db migrate
      - run: bun run db:telemetry
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
        working-directory: apps/console
      # Playwright boots the API (start) + console (dev) via webServer and seeds in globalSetup.
      - name: Run E2E tests
        run: bun --filter @memoturn/console test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/console/playwright-report
          retention-days: 7
