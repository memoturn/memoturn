name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo (checkout, install, test, build) — no writes.
permissions:
  contents: read

jobs:
  # Go SDK is a standalone stdlib-only module — no infra, so it runs as its own fast job
  # (in parallel with build) rather than bolted onto the heavy Postgres/Doris/MinIO pipeline.
  go-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.22"
          cache: false # stdlib-only, no modules to cache
      - name: Go SDK vet + test
        working-directory: sdks/go
        run: |
          test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
          go vet ./...
          go test ./...

  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector-enabled (drop-in postgres:16): the postgres telemetry engine's
        # conformance run needs CREATE EXTENSION vector (ADR-0002).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: memoturn
          POSTGRES_PASSWORD: memoturn
          POSTGRES_DB: memoturn
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U memoturn" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: valkey/valkey:8-alpine
        ports: ["6379:6379"]
      # Bitnami's MinIO runs the server by default (no command override, which GitHub
      # service containers can't set) and auto-creates MINIO_DEFAULT_BUCKETS. Bitnami
      # removed bitnami/minio from Docker Hub; the images live on (pinned) under the
      # bitnamilegacy archive namespace.
      minio:
        image: bitnamilegacy/minio:2025.7.23-debian-12-r5
        env:
          MINIO_ROOT_USER: memoturn
          MINIO_ROOT_PASSWORD: memoturn123
          MINIO_DEFAULT_BUCKETS: memoturn
        ports: ["9000:9000"]

    env:
      DATABASE_URL: postgresql://memoturn:memoturn@localhost:5432/memoturn?schema=public
      # No DORIS_* here on purpose: this job runs no Doris service, and the worker's
      # integration tests gate on DORIS_HOST being set — they run against the real
      # engine in the e2e job instead. Doris-backed conformance tests probe
      # reachability and skip themselves.
      REDIS_URL: redis://localhost:6379
      BLOB_ENDPOINT: http://localhost:9000
      BLOB_REGION: us-east-1
      BLOB_BUCKET: memoturn
      BLOB_ACCESS_KEY_ID: memoturn
      BLOB_SECRET_ACCESS_KEY: memoturn123
      BLOB_FORCE_PATH_STYLE: "true"

    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      # Doc/code drift — read-only, no infra needed; fails fast before the DB/build steps.
      - name: Docs in sync with code
        run: bun run docs:check
      # RBAC guards on mutating routes — every mutating /v1 route must denyIfReadOnly
      # + declare a 403 (or be marked `// rbac-exempt`). Hard gate.
      - name: RBAC guard check
        run: bun run rbac:check
      # Doris FE+BE need static IPs to register with each other, which GitHub service
      # containers can't provide — reuse the repo's dev compose definitions instead.
      # Explicit polling instead of `up --wait`: compose's waiter treats a dependency
      # still in `health: starting` as failed within seconds (observed locally + here).
      # The BE registers with the FE after start; the db:telemetry step retries until
      # a BE is alive, so FE readiness is the only hard gate.
      - name: Start Doris (FE + BE)
        run: |
          docker compose -f infra/docker-compose.dev.yml up -d --no-deps doris-fe
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8030/api/bootstrap >/dev/null; then echo "FE ready"; break; fi
            if [ "$i" = 60 ]; then echo "FE not ready after 5m" >&2; exit 1; fi
            sleep 5
          done
          docker compose -f infra/docker-compose.dev.yml up -d --no-deps doris-be
      - name: Doris logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.dev.yml logs doris-fe doris-be | tail -150
      - run: bun --filter @memoturn/db generate
      - run: bun --filter @memoturn/db migrate
      - run: bun run db:telemetry
      # Wait for MinIO before the integration test writes a blob (services start
      # concurrently and bitnami/minio doesn't expose a health-cmd we can wire here).
      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then echo "minio ready"; exit 0; fi
            sleep 2
          done
          echo "minio did not become ready" >&2; exit 1
      - run: bun run test
      # Second-engine conformance (ADR-0002): the same behavioral suite against the
      # postgres telemetry engine. Engine selection is process-wide (singleton factory),
      # so this is a separate vitest invocation, not a matrix.
      - name: Postgres telemetry migrations
        run: TELEMETRY_ENGINE=postgres bun packages/telemetry/src/migrate.ts
      - name: Postgres-engine conformance
        run: TELEMETRY_ENGINE=postgres bun --filter @memoturn/telemetry test
      # Python SDK unit tests (stdlib-only SDK; pytest mocks urllib, no infra needed).
      - uses: astral-sh/setup-uv@v7
      - name: Python SDK tests
        working-directory: sdks/python
        run: uv run --with pytest pytest -q
      - run: bun run typecheck
      - run: bun run build
