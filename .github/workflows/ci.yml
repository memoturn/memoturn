name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memoturn
          POSTGRES_PASSWORD: memoturn
          POSTGRES_DB: memoturn
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U memoturn" --health-interval 5s
          --health-timeout 5s --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:24.8-alpine
        env:
          CLICKHOUSE_USER: memoturn
          CLICKHOUSE_PASSWORD: memoturn
          CLICKHOUSE_DB: memoturn
        ports: ["8123:8123"]
      redis:
        image: valkey/valkey:8-alpine
        ports: ["6379:6379"]

    env:
      DATABASE_URL: postgresql://memoturn:memoturn@localhost:5432/memoturn?schema=public
      CLICKHOUSE_URL: http://localhost:8123
      CLICKHOUSE_USER: memoturn
      CLICKHOUSE_PASSWORD: memoturn
      CLICKHOUSE_DB: memoturn
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - run: bun install --frozen-lockfile
      - run: bun --filter @memoturn/db generate
      - run: bun --filter @memoturn/db migrate
      - run: bun run db:clickhouse
      - run: bun run test
      - run: bun run typecheck
      - run: bun run build
