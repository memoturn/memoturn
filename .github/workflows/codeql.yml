name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # Interpreted languages need no build step; Go uses build-mode none so the
        # sdks/go module is scanned without a build either.
        language: [javascript-typescript, python, go]
    steps:
      - uses: actions/checkout@v7
      # Default suite: real security vulnerabilities. The "security-and-quality" suite
      # adds noisy style/maintainability queries (e.g. "unpinned action tag") that, with
      # the branch's require-conversation-resolution rule, block every workflow-touching
      # PR. Pin actions to SHAs + re-enable the suite later if desired.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # 'none' is the only mode for interpreted languages and scans Go without a build.
          build-mode: none
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
