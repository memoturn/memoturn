name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # Interpreted languages need no build step; Go needs autobuild (this runner's
        # CodeQL rejects build-mode none for Go) — it builds the sdks/go module itself.
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: go
            build-mode: autobuild
    steps:
      - uses: actions/checkout@v7
      # Default suite: real security vulnerabilities. The "security-and-quality" suite
      # adds noisy style/maintainability queries (e.g. "unpinned action tag") that, with
      # the branch's require-conversation-resolution rule, block every workflow-touching
      # PR. Pin actions to SHAs + re-enable the suite later if desired.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
