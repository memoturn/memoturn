# Deploys the public sites (memoturn.ai + docs.memoturn.ai) to Cloudflare Workers
# on merges to main that touch them. Inert until the CLOUDFLARE_API_TOKEN secret is
# set (a scoped token: Workers Scripts:Edit + the memoturn.ai zone's Workers Routes:Edit).
# Manual deploys remain available via `bun run deploy:site`.
name: Deploy sites

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/docs/**"
      - "packages/ui/**"
      - "packages/tsconfig/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'memoturn/memoturn'
    strategy:
      matrix:
        include:
          - app: "@memoturn/web"
            dir: apps/web
          - app: "@memoturn/docs"
            dir: apps/docs
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - run: bun install --frozen-lockfile
      - name: Deploy ${{ matrix.app }}
        working-directory: ${{ matrix.dir }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret not set — skipping deploy." >&2
            exit 0
          fi
          bun run deploy
