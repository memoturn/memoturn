# Deploys the public sites (memoturn.ai + docs.memoturn.ai) to Cloudflare Workers
# on merges to main that touch them. Inert until the CLOUDFLARE_API_TOKEN secret is
# set (a scoped token: Workers Scripts:Edit + the memoturn.ai zone's Workers Routes:Edit).
# Manual deploys remain available via `bun run deploy:site`.
name: Deploy sites

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/docs/**"
      - "packages/ui/**"
      - "packages/tsconfig/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'memoturn/memoturn'
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: "@memoturn/web"
            dir: apps/web
            url: https://memoturn.ai
          - app: "@memoturn/docs"
            dir: apps/docs
            url: https://docs.memoturn.ai
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - run: bun install --frozen-lockfile
      - name: Deploy ${{ matrix.app }}
        working-directory: ${{ matrix.dir }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret not set — skipping deploy." >&2
            exit 0
          fi
          bun run deploy
      - name: Smoke test ${{ matrix.url }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Mirror the deploy step's guard — no token means nothing was deployed.
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret not set — deploy was skipped, skipping smoke test." >&2
            exit 0
          fi
          for attempt in 1 2 3 4 5; do
            status="$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 15 "${{ matrix.url }}" || true)"
            echo "Attempt $attempt: ${{ matrix.url }} -> HTTP $status"
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed: ${{ matrix.url }} did not return HTTP 200 after 5 attempts." >&2
          exit 1
