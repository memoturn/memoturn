{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "memoturn.fullname" . }}-dataplane
  labels: {{- include "memoturn.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: memoturn
      app.kubernetes.io/component: dataplane
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress, Egress]
  ingress:
    # Only the HTTP API port is reachable; everything else inbound is denied.
    - ports:
        - { protocol: TCP, port: 8080 }
      {{- if not .Values.networkPolicy.allowExternalIngress }}
      from:
        # Node-to-node write forwarding between data-plane pods.
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: memoturn
              app.kubernetes.io/component: dataplane
              app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.networkPolicy.extraIngressFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
  egress:
    # DNS resolution.
    - ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    {{- if .Values.minio.enabled }}
    # In-cluster MinIO object store.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: memoturn
              app.kubernetes.io/component: minio
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - { protocol: TCP, port: 9000 }
    {{- end }}
    {{- if .Values.networkPolicy.allowHttpsEgress }}
    # Managed S3 / hosted extraction + embedding APIs over TLS.
    - ports:
        - { protocol: TCP, port: 443 }
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
