{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "memoturn.serviceAccountName" . }}
  labels: {{- include "memoturn.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
# memoturnd does not talk to the Kubernetes API; never mount a token.
automountServiceAccountToken: false
{{- end }}
