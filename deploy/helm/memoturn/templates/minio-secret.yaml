{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memoturn.minioSecretName" . }}
  labels: {{- include "memoturn.labels" . | nindent 4 }}
type: Opaque
# Dev MinIO credentials, shared by the MinIO server and memoturnd's S3 client.
# Sourced via secretKeyRef so they don't appear inline in the Deployment env.
stringData:
  rootUser: {{ .Values.minio.rootUser | quote }}
  rootPassword: {{ .Values.minio.rootPassword | quote }}
{{- end }}
